{% extends "admin/change_form.html" %}
{% load static %}

{% block extrahead %}
{{ block.super }}
<style>
#seat-selector-wrap { padding: 10px 0; }
#seat-selector-wrap .seat-type-checks { margin-bottom: 12px; }
#seat-selector-wrap .seat-type-checks label {
    display: inline-block; margin-right: 20px; font-size: 14px; cursor: pointer;
}
#seat-selector-wrap .seat-hint { color: #888; font-size: 13px; padding: 8px 0; }
#seat-selector-wrap .seat-loading { color: #888; padding: 10px 0; }
#seat-selector-wrap .seat-full { color: #e6a23c; font-size: 13px; padding: 8px 0; }
#seat-selector-wrap .seat-section-title {
    font-size: 13px; font-weight: 600; color: #555; margin: 10px 0 6px;
    padding-bottom: 4px; border-bottom: 1px solid #eee;
}
#seat-selector-wrap .seat-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
#seat-selector-wrap .seat-item {
    display: flex; align-items: center; justify-content: center;
    min-width: 56px; height: 38px; padding: 4px 12px;
    border: 2px solid #dcdfe6; border-radius: 6px;
    font-size: 13px; color: #303133; cursor: pointer;
    transition: all 0.15s; user-select: none; background: #fff;
}
#seat-selector-wrap .seat-item:hover { border-color: #409eff; color: #409eff; }
#seat-selector-wrap .seat-item.selected { background: #409eff; border-color: #409eff; color: #fff; }
#seat-selector-wrap .seat-item.occupied {
    background: #f5f7fa; border-color: #e4e7ed; color: #c0c4cc; cursor: not-allowed;
}
#seat-selector-wrap .seat-item.room-item {
    flex-direction: column; min-width: 80px; height: auto; padding: 6px 12px;
}
#seat-selector-wrap .seat-item .room-name { font-size: 13px; font-weight: 500; }
#seat-selector-wrap .seat-item .room-cap { font-size: 11px; color: #999; margin-top: 2px; }
#seat-selector-wrap .seat-item.selected .room-cap { color: rgba(255,255,255,0.8); }
#seat-selector-wrap .turnover-hint {
    font-size: 11px; color: #409eff; margin-top: 8px; padding-top: 6px;
    border-top: 1px solid #eee;
}
</style>
<script>
(function() {
    var initialized = false;

    function init() {
        if (initialized) return;
        var storeField = document.getElementById('id_store');
        if (!storeField) return; // 表单还没渲染，等下次
        initialized = true;

        var dateField = document.getElementById('id_reservation_date');
        var timeField = document.getElementById('id_reservation_time');
        var hallField = document.getElementById('id_selected_hall');
        var roomField = document.getElementById('id_selected_rooms');

        // 找到座位信息 fieldset 的 description 区域，插入容器
        var descEl = null;
        var fieldsets = document.querySelectorAll('fieldset.module');
        for (var i = 0; i < fieldsets.length; i++) {
            var h2s = fieldsets[i].querySelectorAll('h2');
            for (var j = 0; j < h2s.length; j++) {
                if (h2s[j].textContent.indexOf('座位信息') >= 0) {
                    descEl = fieldsets[i].querySelector('.description') || fieldsets[i];
                    break;
                }
            }
            if (descEl) break;
        }

        // 创建容器
        var wrap = document.createElement('div');
        wrap.id = 'seat-selector-wrap';
        wrap.innerHTML = '<div class="seat-hint">请先选择门店、预订日期和预订时间</div>';
        if (descEl) {
            descEl.appendChild(wrap);
        } else {
            // 兜底：放到提交按钮前
            var submitRow = document.querySelector('.submit-row');
            if (submitRow) submitRow.parentNode.insertBefore(wrap, submitRow);
        }

        var selectedHall = [];
        var selectedRooms = [];
        var seatData = null;

        {% if original and original.table_numbers %}
        selectedHall = '{{ original.table_numbers }}'.split(',').filter(function(n) { return n.trim(); });
        hallField.value = '{{ original.table_numbers }}';
        {% endif %}
        {% if original and original.table_areas.all %}
        selectedRooms = [{% for ta in original.table_areas.all %}'{{ ta.id }}'{% if not forloop.last %},{% endif %}{% endfor %}];
        roomField.value = selectedRooms.join(',');
        {% endif %}

        function render() {
            var html = '';
            html += '<div class="seat-type-checks">';
            html += '<label><input type="checkbox" id="chk-hall"' + (selectedHall.length > 0 ? ' checked' : '') + '> 大堂</label>';
            html += '<label><input type="checkbox" id="chk-room"' + (selectedRooms.length > 0 ? ' checked' : '') + '> 包间</label>';
            html += '</div>';

            var chkHall = document.getElementById('chk-hall');
            var chkRoom = document.getElementById('chk-room');
            var showHall = (chkHall && chkHall.checked) || selectedHall.length > 0;
            var showRoom = (chkRoom && chkRoom.checked) || selectedRooms.length > 0;

            if (!storeField.value || !dateField.value || !timeField.value) {
                html += '<div class="seat-hint">请先选择门店、预订日期和预订时间</div>';
            } else if (!seatData) {
                html += '<div class="seat-loading">加载座位中...</div>';
            }

            if (showHall && seatData) {
                var avail = seatData.hall.available || [];
                var occ = seatData.hall.occupied || [];
                html += '<div class="seat-section-title">大堂桌号' + (avail.length > 0 ? '（可多选，已选 ' + selectedHall.length + ' 个）' : '') + '</div>';
                if (avail.length === 0 && occ.length === 0) {
                    html += '<div class="seat-hint">暂无大堂座位</div>';
                } else if (avail.length === 0) {
                    html += '<div class="seat-full">大堂座位已满，需排队等待</div>';
                } else {
                    html += '<div class="seat-grid">';
                    avail.forEach(function(s) {
                        var sel = selectedHall.indexOf(s.number) >= 0 ? ' selected' : '';
                        html += '<div class="seat-item' + sel + '" data-type="hall" data-number="' + s.number + '">' + s.number + '号</div>';
                    });
                    occ.forEach(function(s) {
                        html += '<div class="seat-item occupied">' + s.number + '号</div>';
                    });
                    html += '</div>';
                }
            }

            if (showRoom && seatData) {
                var avail = seatData.rooms.available || [];
                var occ = seatData.rooms.occupied || [];
                html += '<div class="seat-section-title">包间' + (avail.length > 0 ? '（可多选，已选 ' + selectedRooms.length + ' 个）' : '') + '</div>';
                if (avail.length === 0 && occ.length === 0) {
                    html += '<div class="seat-hint">暂无包间</div>';
                } else if (avail.length === 0) {
                    html += '<div class="seat-full">包间已满，需排队等待</div>';
                } else {
                    html += '<div class="seat-grid">';
                    avail.forEach(function(r) {
                        var sel = selectedRooms.indexOf(String(r.id)) >= 0 ? ' selected' : '';
                        html += '<div class="seat-item room-item' + sel + '" data-type="room" data-id="' + r.id + '">';
                        html += '<div class="room-name">' + r.name + '</div>';
                        html += '<div class="room-cap">' + r.capacity + '人</div></div>';
                    });
                    occ.forEach(function(r) {
                        html += '<div class="seat-item room-item occupied">';
                        html += '<div class="room-name">' + r.name + '</div>';
                        html += '<div class="room-cap">' + r.capacity + '人</div></div>';
                    });
                    html += '</div>';
                }
            }

            if (seatData) {
                html += '<div class="turnover-hint">座位锁定时段：预订时间前1小时至后2小时，超出时段可翻台预订</div>';
            }

            wrap.innerHTML = html;

            // 绑定座位点击（事件委托）
            wrap.onclick = function(e) {
                var item = e.target.closest('.seat-item');
                if (!item || item.classList.contains('occupied')) return;
                var type = item.getAttribute('data-type');
                if (type === 'hall') {
                    var num = item.getAttribute('data-number');
                    var idx = selectedHall.indexOf(num);
                    if (idx >= 0) selectedHall.splice(idx, 1); else selectedHall.push(num);
                    hallField.value = selectedHall.join(',');
                } else if (type === 'room') {
                    var id = String(item.getAttribute('data-id'));
                    var idx = selectedRooms.indexOf(id);
                    if (idx >= 0) selectedRooms.splice(idx, 1); else selectedRooms.push(id);
                    roomField.value = selectedRooms.join(',');
                }
                render();
            };

            // 绑定checkbox
            var c1 = document.getElementById('chk-hall');
            var c2 = document.getElementById('chk-room');
            if (c1) c1.onchange = function() { if (!this.checked) { selectedHall = []; hallField.value = ''; } render(); };
            if (c2) c2.onchange = function() { if (!this.checked) { selectedRooms = []; roomField.value = ''; } render(); };
        }

        function loadSeats() {
            var storeId = storeField.value;
            var date = dateField.value;
            var time = timeField.value;

            selectedHall = [];
            selectedRooms = [];
            hallField.value = '';
            roomField.value = '';
            seatData = null;
            render();

            if (!storeId || !date || !time) return;

            var dateFormatted = date.replace(/\//g, '-');
            var timeParts = time.split(':');
            if (timeParts.length === 2) time = time + ':00';

            var url = '/api/reservations/admin_seats/?store=' + storeId + '&date=' + dateFormatted + '&time=' + encodeURIComponent(time);
            console.log('[SeatSelector] Loading:', url);

            fetch(url, { credentials: 'same-origin', headers: {'X-Requested-With': 'XMLHttpRequest'} })
            .then(function(r) {
                console.log('[SeatSelector] Status:', r.status);
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            })
            .then(function(data) {
                console.log('[SeatSelector] Data:', JSON.stringify(data).substring(0, 200));
                seatData = data;
                render();
            })
            .catch(function(err) {
                console.error('[SeatSelector] Error:', err);
                wrap.innerHTML = '<div class="seat-hint" style="color:red;">座位加载失败: ' + err.message + '</div>';
            });
        }

        // 用事件委托监听字段变化（不直接绑定到字段上）
        document.addEventListener('change', function(e) {
            if (e.target === storeField || e.target === dateField || e.target === timeField) {
                console.log('[SeatSelector] Field changed:', e.target.id, e.target.value);
                loadSeats();
            }
        });
        document.addEventListener('input', function(e) {
            if (e.target === dateField || e.target === timeField) {
                clearTimeout(window._seatTimer);
                window._seatTimer = setTimeout(loadSeats, 300);
            }
        });

        render();

        {% if original %}
        if (storeField.value && dateField.value && timeField.value) {
            loadSeats();
        }
        {% endif %}

        console.log('[SeatSelector] Initialized successfully');
    }

    // 轮询等待表单渲染
    function poll() {
        if (document.getElementById('id_store')) {
            init();
        } else {
            setTimeout(poll, 100);
        }
    }
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', poll);
    } else {
        poll();
    }
})();
</script>
{% endblock %}
